# CI and deploy on push to main.
# Secrets: SSH_KEY, VPS_HOST, VPS_USER. Optional: VPS_PATH (default ~/PQC-shield).
name: CI and Deploy

on:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run pytest
        run: |
          cd backend
          pytest tests/ -v

  frontend:
    name: Frontend (tsc + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: ESLint
        run: |
          cd frontend
          npx eslint .

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Set up SSH key
        run: |
          install -m 600 -d ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy on VPS
        run: |
          DEPLOY_PATH="${{ secrets.VPS_PATH }}"
          [ -z "$DEPLOY_PATH" ] && DEPLOY_PATH="~/PQC-shield"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd $DEPLOY_PATH && docker compose pull && docker compose up -d"
